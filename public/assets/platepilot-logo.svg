<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941D"/>
    </linearGradient>
    <linearGradient id="goldBright" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6BC"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  
  <!-- Dark navy background -->
  <circle cx="100" cy="100" r="98" fill="#0f172a"/>
  
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gold)" stroke-width="4"/>
  
  <!-- Inner tech ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 8"/>
  
  <!-- Tech dots on outer ring -->
  <circle cx="100" cy="12" r="4" fill="#475569"/>
  <circle cx="175" cy="60" r="4" fill="#475569"/>
  <circle cx="188" cy="100" r="4" fill="#475569"/>
  <circle cx="175" cy="140" r="4" fill="#475569"/>
  <circle cx="25" cy="60" r="4" fill="#475569"/>
  <circle cx="25" cy="140" r="4" fill="#475569"/>
  
  <!-- Main wing/arrow shape (centered, pointing right) -->
  <g transform="translate(100,100)">
    <!-- Outer wing -->
    <path d="M-50,-25 L-30,-32 L60,0 L60,6 L-30,38 L-50,31 Z" fill="url(#goldBright)"/>
    <!-- Inner dark cutout creating layered effect -->
    <path d="M-25,-14 L0,-22 L50,0 L50,4 L0,26 L-25,18 Z" fill="#0f172a"/>
    <!-- Speed/motion lines -->
    <line x1="-68" y1="-6" x2="-52" y2="-6" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-75" y1="3" x2="-52" y2="3" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-68" y1="12" x2="-52" y2="12" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
