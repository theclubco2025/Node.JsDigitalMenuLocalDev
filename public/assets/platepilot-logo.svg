<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="50%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#A68B1B"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="98" fill="#1a2234"/>
  
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- Inner tech ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  
  <!-- Tech dots -->
  <circle cx="100" cy="25" r="3" fill="#4a5568"/>
  <circle cx="165" cy="65" r="3" fill="#4a5568"/>
  <circle cx="172" cy="100" r="3" fill="#4a5568"/>
  <circle cx="165" cy="135" r="3" fill="#4a5568"/>
  <circle cx="35" cy="65" r="3" fill="#4a5568"/>
  <circle cx="35" cy="135" r="3" fill="#4a5568"/>
  
  <!-- Main wing/arrow shape -->
  <g transform="translate(100,100)">
    <!-- Outer wing -->
    <path d="M-55,-20 L-25,-30 L55,0 L55,8 L-25,38 L-55,28 Z" fill="url(#gold)"/>
    <!-- Inner cutout -->
    <path d="M-25,-10 L5,-18 L45,0 L45,6 L5,24 L-25,16 Z" fill="#1a2234"/>
    <!-- Speed lines -->
    <rect x="-72" y="-4" width="12" height="3" fill="url(#gold)" rx="1"/>
    <rect x="-78" y="3" width="18" height="4" fill="url(#gold)" rx="2"/>
    <rect x="-72" y="12" width="12" height="3" fill="url(#gold)" rx="1"/>
  </g>
</svg>
