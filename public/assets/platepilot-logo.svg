<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D78C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941D"/>
    </linearGradient>
  </defs>
  
  <!-- Dark navy background -->
  <circle cx="100" cy="100" r="98" fill="#0D1B2A"/>
  
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- Inner tech circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#1B3A4B" stroke-width="2"/>
  
  <!-- Tech dots around the ring -->
  <circle cx="100" cy="14" r="4" fill="#3D5A6C"/>
  <circle cx="172" cy="55" r="4" fill="#3D5A6C"/>
  <circle cx="186" cy="100" r="4" fill="#3D5A6C"/>
  <circle cx="172" cy="145" r="4" fill="#3D5A6C"/>
  <circle cx="28" cy="55" r="4" fill="#3D5A6C"/>
  <circle cx="28" cy="145" r="4" fill="#3D5A6C"/>
  
  <!-- Main arrow/chevron pointing right -->
  <g transform="translate(100,100)">
    <!-- Outer gold arrow -->
    <path d="M-45,-28 L-25,-35 L55,0 L-25,35 L-45,28 L15,0 Z" fill="url(#goldGrad)"/>
    <!-- Inner dark cutout -->
    <path d="M-20,-18 L-5,-23 L40,0 L-5,23 L-20,18 L10,0 Z" fill="#0D1B2A"/>
    <!-- Speed lines -->
    <rect x="-70" y="-8" width="18" height="4" rx="2" fill="url(#goldGrad)"/>
    <rect x="-75" y="-1" width="22" height="5" rx="2.5" fill="url(#goldGrad)"/>
    <rect x="-70" y="6" width="18" height="4" rx="2" fill="url(#goldGrad)"/>
  </g>
</svg>
