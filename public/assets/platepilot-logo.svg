<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#AA8C2C"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ringGradient)" stroke-width="4"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#3D4A5C" stroke-width="2"/>
  
  <!-- Wing/Plate arrow shape -->
  <g transform="translate(100, 100)">
    <!-- Main wing body -->
    <path d="M-60,0 L-20,-25 L60,0 L60,5 L-20,25 L-60,5 Z" fill="url(#goldGradient)"/>
    
    <!-- Inner cutout for arrow effect -->
    <path d="M-30,0 L0,-12 L40,0 L40,3 L0,12 L-30,3 Z" fill="#1a2234"/>
    
    <!-- Speed lines -->
    <line x1="-75" y1="-5" x2="-62" y2="-5" stroke="url(#goldGradient)" stroke-width="2"/>
    <line x1="-80" y1="0" x2="-62" y2="0" stroke="url(#goldGradient)" stroke-width="3"/>
    <line x1="-75" y1="5" x2="-62" y2="5" stroke="url(#goldGradient)" stroke-width="2"/>
  </g>
  
  <!-- Tech dots on ring -->
  <circle cx="100" cy="18" r="3" fill="#4A5568"/>
  <circle cx="175" cy="60" r="3" fill="#4A5568"/>
  <circle cx="182" cy="100" r="3" fill="#4A5568"/>
  <circle cx="175" cy="140" r="3" fill="#4A5568"/>
</svg>
